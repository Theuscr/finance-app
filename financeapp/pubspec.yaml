name: finance_app
description: Aplicativo de Controle Financeiro

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5

  # Local DB
  floor: ^1.4.0
  sqflite: ^2.3.3
  path: ^1.9.0

  # HTTP / API
  http: ^1.2.2
  dio: ^5.4.3

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  lottie: ^3.1.2

  # Utils
  get_it: ^7.7.0
  injectable: ^2.4.4
  shared_preferences: ^2.3.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  floor_generator: ^1.4.0
  injectable_generator: ^2.4.4
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
